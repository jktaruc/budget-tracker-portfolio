name: CI on Main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Java (for Spring Boot backend)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Make Gradle wrapper executable
      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      # 4️⃣ Build & test backend
      - name: Build backend
        run: |
          cd backend
          ./gradlew clean build

      # 5️⃣ Setup Node (for React frontend)
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 6️⃣ Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      # 7️⃣ Run frontend tests
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --run
